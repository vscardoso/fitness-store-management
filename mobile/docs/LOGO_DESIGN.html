<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Store Logo</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .canvas-container {
            background: #fafafa;
            padding: 20px;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .light { background: white; }
        .dark { background: #1a1a1a; }
        
        svg {
            max-width: 100%;
            height: auto;
        }
        
        h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .label {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <!-- 512px - Print/Hero Size -->
    <div class="container">
        <h3>Print (512px)</h3>
        <div class="canvas-container light">
            <svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                <!-- Background circle for context -->
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                    </linearGradient>
                </defs>
                
                <!-- Main symbol group - centered -->
                <g transform="translate(256, 256)">
                    <!-- Vertical bar (strength/growth) -->
                    <rect x="-30" y="-100" width="60" height="200" rx="12" fill="#667eea" />
                    
                    <!-- Horizontal bar (structure/management) -->
                    <rect x="-100" y="-30" width="200" height="60" rx="12" fill="#764ba2" />
                    
                    <!-- Intersection circle (dynamic point) -->
                    <circle cx="0" cy="0" r="45" fill="url(#grad1)" />
                    
                    <!-- Top accent element (upward momentum) -->
                    <path d="M -25,-120 L 0,-160 L 25,-120 Z" fill="#10B981" opacity="0.9" />
                    
                    <!-- Inner detail - circle outline -->
                    <circle cx="0" cy="0" r="35" fill="none" stroke="white" stroke-width="8" />
                    
                    <!-- Core symbol - stylized dumbbell/container hybrid -->
                    <g>
                        <!-- Left weight -->
                        <rect x="-55" y="-15" width="20" height="30" rx="4" fill="white" opacity="0.95" />
                        <!-- Right weight -->
                        <rect x="35" y="-15" width="20" height="30" rx="4" fill="white" opacity="0.95" />
                        <!-- Center bar -->
                        <rect x="-20" y="-5" width="40" height="10" rx="3" fill="white" opacity="0.95" />
                    </g>
                </g>
            </svg>
        </div>
        <p class="label">Hero & Print Use</p>
    </div>

    <!-- 256px - Web Logo -->
    <div class="container">
        <h3>Web Logo (256px)</h3>
        <div class="canvas-container light">
            <svg width="256" height="256" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <g transform="translate(256, 256)">
                    <rect x="-30" y="-100" width="60" height="200" rx="12" fill="#667eea" />
                    <rect x="-100" y="-30" width="200" height="60" rx="12" fill="#764ba2" />
                    <circle cx="0" cy="0" r="45" fill="url(#grad2)" />
                    <path d="M -25,-120 L 0,-160 L 25,-120 Z" fill="#10B981" opacity="0.9" />
                    <circle cx="0" cy="0" r="35" fill="none" stroke="white" stroke-width="8" />
                    <rect x="-55" y="-15" width="20" height="30" rx="4" fill="white" opacity="0.95" />
                    <rect x="35" y="-15" width="20" height="30" rx="4" fill="white" opacity="0.95" />
                    <rect x="-20" y="-5" width="40" height="10" rx="3" fill="white" opacity="0.95" />
                </g>
            </svg>
        </div>
        <p class="label">Website & App</p>
    </div>

    <!-- 128px - Favicon Size -->
    <div class="container">
        <h3>Favicon (128px)</h3>
        <div class="canvas-container light" style="border: 1px solid #e0e0e0;">
            <svg width="128" height="128" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <g transform="translate(256, 256)">
                    <rect x="-30" y="-100" width="60" height="200" rx="12" fill="#667eea" />
                    <rect x="-100" y="-30" width="200" height="60" rx="12" fill="#764ba2" />
                    <circle cx="0" cy="0" r="45" fill="url(#grad3)" />
                    <path d="M -25,-120 L 0,-160 L 25,-120 Z" fill="#10B981" opacity="0.9" />
                    <circle cx="0" cy="0" r="35" fill="none" stroke="white" stroke-width="8" />
                </g>
            </svg>
        </div>
        <p class="label">Favicon & Icon Use</p>
    </div>

    <!-- Dark Background Test -->
    <div class="container">
        <h3>Dark Background (256px)</h3>
        <div class="canvas-container dark">
            <svg width="256" height="256" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <g transform="translate(256, 256)">
                    <rect x="-30" y="-100" width="60" height="200" rx="12" fill="#667eea" />
                    <rect x="-100" y="-30" width="200" height="60" rx="12" fill="#764ba2" />
                    <circle cx="0" cy="0" r="45" fill="url(#grad4)" />
                    <path d="M -25,-120 L 0,-160 L 25,-120 Z" fill="#10B981" opacity="0.9" />
                    <circle cx="0" cy="0" r="35" fill="none" stroke="white" stroke-width="8" />
                    <rect x="-55" y="-15" width="20" height="30" rx="4" fill="white" opacity="0.95" />
                    <rect x="35" y="-15" width="20" height="30" rx="4" fill="white" opacity="0.95" />
                    <rect x="-20" y="-5" width="40" height="10" rx="3" fill="white" opacity="0.95" />
                </g>
            </svg>
        </div>
        <p class="label">Dark Mode & Inverse</p>
    </div>

    <!-- Logo with Wordmark -->
    <div class="container" style="width: 100%; max-width: 600px;">
        <h3>Logo + Wordmark (Full Brand)</h3>
        <div class="canvas-container light" style="justify-content: flex-start; padding: 40px;">
            <svg width="500" height="120" viewBox="0 0 500 120" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                    </linearGradient>
                </defs>
                
                <!-- Logo mark -->
                <g transform="translate(40, 60)">
                    <rect x="-15" y="-50" width="30" height="100" rx="6" fill="#667eea" />
                    <rect x="-50" y="-15" width="100" height="30" rx="6" fill="#764ba2" />
                    <circle cx="0" cy="0" r="22" fill="url(#grad5)" />
                    <path d="M -12,-56 L 0,-80 L 12,-56 Z" fill="#10B981" opacity="0.9" />
                    <circle cx="0" cy="0" r="18" fill="none" stroke="white" stroke-width="4" />
                </g>
                
                <!-- Wordmark -->
                <text x="110" y="75" font-family="'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#1a1a1a">
                    FitFlow
                </text>
                <text x="110" y="95" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#667eea" letter-spacing="2">
                    STORE MANAGEMENT
                </text>
            </svg>
        </div>
        <p class="label">Identity System</p>
    </div>

    <script>
        // Helper script to save SVG as PNG
        console.log('Logo design system ready. To save as PNG, right-click any SVG and select "Save image as"');
    </script>
</body>
</html>
