<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dynamic Structure Logo -->
  <!-- Color: Primary #667eea, Secondary #764ba2, Accent #10B981 -->
  
  <defs>
    <linearGradient id="fitflow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <filter id="fitflow-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Main symbol group - centered -->
  <g transform="translate(256, 256)">
    <!-- Vertical bar (strength/growth) -->
    <rect x="-30" y="-100" width="60" height="200" rx="12" fill="#667eea" filter="url(#fitflow-shadow)" />
    
    <!-- Horizontal bar (structure/management) -->
    <rect x="-100" y="-30" width="200" height="60" rx="12" fill="#764ba2" filter="url(#fitflow-shadow)" />
    
    <!-- Intersection circle (dynamic point) -->
    <circle cx="0" cy="0" r="45" fill="url(#fitflow-gradient)" filter="url(#fitflow-shadow)" />
    
    <!-- Top accent element (upward momentum) -->
    <path d="M -25,-120 L 0,-160 L 25,-120 Z" fill="#10B981" opacity="0.9" filter="url(#fitflow-shadow)" />
    
    <!-- Inner detail - circle outline -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" />
    
    <!-- Core symbol - stylized dumbbell/container hybrid -->
    <!-- Left weight -->
    <rect x="-55" y="-15" width="20" height="30" rx="4" fill="white" opacity="0.95" />
    <!-- Right weight -->
    <rect x="35" y="-15" width="20" height="30" rx="4" fill="white" opacity="0.95" />
    <!-- Center bar -->
    <rect x="-20" y="-5" width="40" height="10" rx="3" fill="white" opacity="0.95" />
  </g>
</svg>
