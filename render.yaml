services:
  - type: web
    name: fitness-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python scripts/db_init.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://expo.dev,https://*.expo.dev,https://fitness-store.app
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
